<title>PC Builder Pro v4.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --yellow: #ffd740; --red: #ff5252; --text: #e0e0e0;
    --text2: #9e9e9e; --border: #2d3147;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding-bottom: 80px; }
  #header { background: var(--bg2); padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  #header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #header .version { font-size: 11px; color: var(--text2); margin-left: auto; }
  #search-bar { padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
  #search-bar input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
  #search-bar input:focus { border-color: var(--accent); }
  #filters { padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; background: var(--bg2); border-bottom: 1px solid var(--border); scrollbar-width: none; }
  #filters::-webkit-scrollbar { display: none; }
  .filter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #content { padding: 12px 16px; }
  .section-title { font-size: 13px; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .component-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
  .component-card:active { transform: scale(0.98); }
  .component-card.selected { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .component-card .card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; padding-right: 70px; }
  .component-card .card-brand { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
  .component-card .card-specs { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .component-card .card-price { position: absolute; top: 14px; right: 14px; font-size: 14px; font-weight: 700; color: var(--green); z-index: 1; background: var(--bg2); padding-left: 4px; }
  .card-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .badge-new { background: rgba(0,230,118,0.15); color: var(--green); }
  .badge-hot { background: rgba(255,101,132,0.15); color: var(--accent2); }
  .badge-budget { background: rgba(255,215,64,0.15); color: var(--yellow); }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; cursor: pointer; transition: all 0.2s; border: none; background: none; color: var(--text2); font-size: 10px; gap: 3px; position: relative; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .build-count { background: var(--accent); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; position: absolute; top: 4px; right: 8px; }
  .build-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .build-item .item-cat { font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; }
  .build-item .item-name { font-size: 13px; flex: 1; }
  .build-item .item-price { font-size: 13px; color: var(--green); font-weight: 600; }
  .build-item .item-remove { color: var(--red); font-size: 18px; cursor: pointer; padding: 0 6px; }
  .total-bar { background: var(--bg3); border-radius: 14px; padding: 16px; margin-top: 16px; }
  .total-bar .total-label { font-size: 13px; color: var(--text2); }
  .total-bar .total-price { font-size: 28px; font-weight: 700; color: var(--green); }
  .compat-check { margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 13px; }
  .compat-ok { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .compat-warn { background: rgba(255,215,64,0.1); color: var(--yellow); border: 1px solid rgba(255,215,64,0.2); }
  .compat-err { background: rgba(255,82,82,0.1); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .no-results { text-align: center; padding: 40px; color: var(--text2); }
  .add-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .selected .add-btn { background: var(--red); }
  #more-menu { display: none; position: fixed; bottom: 72px; right: 0; left: 0; background: var(--bg2); border-top: 1px solid var(--border); z-index: 200; padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  #more-menu.open { display: flex; }
</style>
</head>

// ── Приложение ──
let currentTab = 'cpu';
let currentFilter = 'all';
let myBuild = {};
let moreOpen = false;

const catMap = {cpu:'cpu',gpu:'gpu',mb:'mb',ram:'ram',storage:'storage',psu:'psu',case:'case',cooling:'cooling',monitor:'monitor'};

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+tab);
  if(nb) nb.classList.add('active');
  document.getElementById('more-menu').classList.remove('open');
  moreOpen = false;
  if(tab==='build'){
    document.getElementById('build-panel').style.display='block';
    document.getElementById('components-panel').style.display='none';
    renderBuild();
  } else {
    document.getElementById('build-panel').style.display='none';
    document.getElementById('components-panel').style.display='block';
    renderComponents();
  }
}
function toggleMore(){moreOpen=!moreOpen;document.getElementById('more-menu').classList.toggle('open',moreOpen);}
function closeMore(){document.getElementById('more-menu').classList.remove('open');moreOpen=false;}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderComponents();}
function filterComponents(){renderComponents();}

function getItems(){
  const cat=catMap[currentTab];
  if(!cat||!DB[cat])return[];
  let items=DB[cat];
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(q) items=items.filter(i=>(i.name+i.brand+(i.specs||'')).toLowerCase().includes(q));
  if(currentFilter==='budget') items=items.filter(i=>i.price>0&&i.price<=200);
  else if(currentFilter==='mid') items=items.filter(i=>i.price>200&&i.price<=600);
  else if(currentFilter==='high') items=items.filter(i=>i.price>600);
  else if(currentFilter==='new') items=items.filter(i=>i.year>=2024);
  else if(currentFilter==='intel') items=items.filter(i=>i.brand.toLowerCase().includes('intel'));
  else if(currentFilter==='amd') items=items.filter(i=>i.brand.toLowerCase().includes('amd'));
  else if(currentFilter==='nvidia') items=items.filter(i=>i.brand.toLowerCase().includes('nvidia'));
  else if(currentFilter==='asrock') items=items.filter(i=>i.brand.toLowerCase().includes('asrock'));
  return items;
}

function renderComponents(){
  const cat=catMap[currentTab];
  if(!cat)return;
  const items=getItems();
  const catNames={cpu:'Процессоры',gpu:'Видеокарты',mb:'Материнские платы',ram:'Оперативная память',storage:'Накопители',psu:'Блоки питания',case:'Корпуса',cooling:'Охлаждение',monitor:'Мониторы'};
  const panel=document.getElementById('components-panel');
  let html=`<div class="section-title">${catNames[cat]||cat} — ${items.length} позиций</div>`;
  if(!items.length){html+='<div class="no-results">Ничего не найдено 🔍<br>Попробуйте изменить фильтр или поиск</div>';panel.innerHTML=html;return;}
  items.forEach(item=>{
    const sel=myBuild[cat]&&myBuild[cat].id===item.id;
    const badgeHtml=item.badge?`<span class="card-badge badge-${item.badge}">${item.badge==='new'?'🆕 Новинка 2024-25':item.badge==='hot'?'🔥 Хит':item.badge==='budget'?'💰 Бюджет':''}</span>`:'';
    const priceStr=item.price>0?'$'+item.price.toLocaleString():'встр.';
    html+=`<div class="component-card${sel?' selected':''}" onclick="selectItem('${cat}','${item.id}')">
      <div class="card-brand">${item.brand}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-price">${priceStr}</div>
      <div class="card-specs">${item.specs}</div>
      ${badgeHtml}
      <div><button class="add-btn">${sel?'✓ Убрать':'+ Добавить'}</button></div>
    </div>`;
  });
  panel.innerHTML=html;
}

function selectItem(cat,id){
  const item=DB[cat].find(i=>i.id===id);
  if(!item)return;
  if(myBuild[cat]&&myBuild[cat].id===id) delete myBuild[cat];
  else myBuild[cat]=item;
  updateBuildCount();
  renderComponents();
}

function updateBuildCount(){
  const count=Object.keys(myBuild).length;
  const el=document.getElementById('buildCount');
  if(count>0){el.style.display='flex';el.textContent=count;}
  else el.style.display='none';
}

function renderBuild(){
  const cats={cpu:'Процессор',gpu:'Видеокарта',mb:'Мат. плата',ram:'ОЗУ',storage:'Накопитель',psu:'БП',case:'Корпус',cooling:'Охлаждение',monitor:'Монитор'};
  const list=document.getElementById('build-list');
  const empty=document.getElementById('buildEmpty');
  const keys=Object.keys(myBuild);
  if(!keys.length){list.innerHTML='';empty.style.display='block';document.getElementById('totalPrice').textContent='$0';document.getElementById('compatStatus').innerHTML='';return;}
  empty.style.display='none';
  let html='',total=0;
  keys.forEach(cat=>{
    const item=myBuild[cat];
    total+=item.price||0;
    html+=`<div class="build-item">
      <div class="item-cat">${cats[cat]||cat}</div>
      <div class="item-name">${item.brand} ${item.name}</div>
      <div class="item-price">${item.price>0?'$'+item.price.toLocaleString():'—'}</div>
      <div class="item-remove" onclick="removeItem('${cat}')">✕</div>
    </div>`;
  });
  list.innerHTML=html;
  document.getElementById('totalPrice').textContent='$'+total.toLocaleString();
  checkCompat();
}

function removeItem(cat){delete myBuild[cat];updateBuildCount();renderBuild();}

function checkCompat(){
  const el=document.getElementById('compatStatus');
  const w=[],e=[];
  const {cpu,mb,ram,psu,gpu}=myBuild;
  if(cpu&&mb&&cpu.socket!==mb.socket) e.push(`⚠️ Сокет CPU (${cpu.socket}) ≠ мат. плате (${mb.socket})`);
  if(ram&&mb&&ram.type!==mb.memory) e.push(`⚠️ Тип RAM (${ram.type}) ≠ поддержке платы (${mb.memory})`);
  if(psu&&gpu&&cpu){
    const need=(gpu.tdp||0)+(cpu.tdp||0)+120;
    if(psu.wattage<need) e.push(`⚡ БП ${psu.wattage}W мало! Нужно ~${need}W`);
    else if(psu.wattage<need+100) w.push(`⚡ БП ${psu.wattage}W впритык, лучше ${need+100}W+`);
  }
  if(e.length) el.innerHTML=`<div class="compat-check compat-err">${e.join('<br>')}</div>`;
  else if(w.length) el.innerHTML=`<div class="compat-check compat-warn">${w.join('<br>')}</div>`;
  else if(Object.keys(myBuild).length>=3) el.innerHTML=`<div class="compat-check compat-ok">✅ Компоненты совместимы!</div>`;
  else el.innerHTML='';
}

// Подсчёт общего количества
const total=Object.values(DB).reduce((a,b)=>a+b.length,0);
document.getElementById('totalCount').textContent=`v4.0 • ${total} компонентов`;

renderComponents();
</script>
